name: Update README with activity

on:
  schedule:
    - cron: "0 * * * *"   # runs every hour
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update activity
        uses: JamesIves/github-activity-readme@v0.4.1
        with:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
